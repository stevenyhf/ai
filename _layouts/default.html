<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        nav a {
            display: inline-block;
            margin: 5px 10px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <nav>
        {% for page in site.html_pages %}
            {% if page.name != "404.html" %}
                <a href="{{ page.url }}">{{ page.name }}</a>
            {% endif %}
        {% endfor %}
    </nav>
    
    {% if page.name != "index.html" %}
        <a href="/" style="display:inline-block;margin:20px 0;padding:10px 20px;background:#667eea;color:white;text-decoration:none;border-radius:5px;">← 返回首页</a>
    {% endif %}
    
    {{ content }}
</body>
</html>
